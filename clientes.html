<!DOCTYPE html> 
<html>
<head>
  <title>Clientes PRO</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Clientes</h1>

  <div style="display:flex; gap:10px; align-items:center;">
    <a href="index.html"><button>Dashboard</button></a>
    <a href="listado.html"><button>+ Añadir Servicio/Proveedor</button></a>

    <button onclick="openModal()">+ Nuevo Cliente</button>
  </div>
</header>

<!-- BUSCADOR -->
<input class="search" placeholder="Buscar..." oninput="search(this.value)">

<!-- TABLA PRO -->
<table id="tabla" class="tabla-pro">
  <thead>
    <tr>
      <th>Cliente</th>
      <th>Servicio</th>
      <th>Correo</th>
      <th>Perfil</th>
      <th>Vencimiento</th>
      <th>Proveedor</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- ================= MODAL CLIENTE ================= -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Cliente</h3>

    <input id="nombre" placeholder="Nombre">
    <input id="apellido" placeholder="Apellido">
    <input id="celular" placeholder="Celular">

    <label><h3>Servicio</h3></label>
    <select id="servicioSelect">
      <option value="">Seleccionar servicio</option>
    </select>

    <label><h3>Proveedor</h3></label>
    <select id="proveedorSelect">
      <option value="">Seleccionar proveedor</option>
    </select>

    <!-- CAMPOS OCULTOS -->
    <input id="servicio" type="hidden">
    <input id="proveedor" type="hidden">

    <hr>

    <h3>Acceso / Cuenta</h3>

    <input id="correo" placeholder="Correo">
    <input id="password" placeholder="Contraseña">
    <input id="pin_perfil" placeholder="PIN Perfil">
    <input id="nombre_perfil" placeholder="Nombre Perfil">

    <hr>

    <h3>Precio</h3>

    <input id="costo" placeholder="Costo">
    <input id="venta" placeholder="Venta">
    <input id="vencimiento" type="date">

    <div style="margin-top:10px; display:flex; gap:10px;">
      <button onclick="save()">Guardar</button>
      <button onclick="closeModal()">Cerrar</button>
    </div>

  </div>
</div>

<!-- ================= MODAL RENOVAR (NUEVO) ================= -->
<div class="modal" id="modalRenovar">
  <div class="modal-content">

    <h3>Renovar Cliente</h3>

    <label>Nueva fecha de vencimiento</label>
    <input type="date" id="renovarFecha">

    <div style="margin-top:10px; display:flex; gap:10px;">
      <button onclick="confirmarRenovacion()">Confirmar</button>
      <button onclick="cerrarRenovar()">Cancelar</button>
    </div>

  </div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/@supabase/supabase-js"></script>
<script src="app.js"></script>
<script src="clientes.js"></script>

</body>
</html>
