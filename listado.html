<!DOCTYPE html>
<html>
<head>
  <title>Servicios</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Servicios</h1>

  <div>
    <a href="index.html"><button>Dashboard</button></a>
    <a href="clientes.html"><button>Clientes</button></a>
    <a href="clientes.html?new=true">
  <button>+ Nuevo Cliente</button>
</a>
  </div>
</header>

<div style="padding:20px;">

  <div style="color: #a5b4fc;"><h2>Agregar / Editar Servicio</h2></div>

  <input id="nombre" placeholder="Servicio">
  <input id="costo" placeholder="Costo">
  <input id="venta" placeholder="Venta">
  <input id="proveedor" placeholder="Proveedor">

  <button onclick="addService()">Guardar</button>

  <hr>

  <!-- 🔍 BUSCADOR -->
  <input 
    placeholder="Buscar servicio o proveedor..." 
    oninput="searchServicios(this.value)"
    style="margin-bottom:10px; width:100%; padding:8px;"
  >

  <!-- 📊 TABLA PRO -->
  <table id="tabla" class="tabla-pro">
    <thead>
      <tr>
        <th>Servicio</th>
        <th>Costo</th>
        <th>Venta</th>
        <th>Proveedor</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script src="https://unpkg.com/@supabase/supabase-js"></script>
<script src="app.js"></script>
<script src="servicios.js"></script>

</body>
</html>
